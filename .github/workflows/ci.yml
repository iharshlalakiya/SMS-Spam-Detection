name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        # Run pytest and stop the pipeline if any tests fail
        pytest tests/ -v

    - name: Validate ML Pipeline (DVC)
      run: |
        # Pulls the raw dataset from the web and actively recreates the model 
        # to ensure the reproduction chain is completely healthy on this PR!
        dvc repro
