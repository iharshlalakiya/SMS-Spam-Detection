name: Auto-Retrain on New Data

on:
  push:
    branches: [main]
    paths:
      - "data/raw/**.csv"      # triggers only when CSV data changes
      - "params.yaml"          # or when hyperparams change

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          dvc repro

      - name: Run main pipeline with MLflow tracking
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python main.py --skip-download

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: svm-metrics
          path: results/metrics/svm_results.json

      - name: Deploy retrained model to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            export PATH="/home/azureuser/SMS-Spam-Detection/.venv/bin:$PATH"
            cd /home/azureuser/SMS-Spam-Detection

            echo "Pulling latest code + new data..."
            git fetch origin main
            git reset --hard origin/main

            echo "Re-running pipeline on VM..."
            dvc repro
            python main.py --skip-download

            echo "Restarting Streamlit app..."
            sudo systemctl restart streamlit

            echo "Retrain + deploy complete."
