# =============================================================================
# params.yaml — DVC Hyperparameter Store
# =============================================================================
# All tunable values live here. DVC tracks changes to this file and
# automatically re-runs only the affected downstream stages when you run:
#
#   dvc repro
#
# View current metrics:
#   dvc metrics show
# =============================================================================

data:
  raw_path: data/raw/spam.csv
  processed_path: data/processed/processed.pkl
  features_path: data/processed/features.pkl
  test_size: 0.2
  random_state: 42

tfidf:
  max_features: 5000
  ngram_range: [1, 2]
  min_df: 1
  sublinear_tf: true

svm:
  C: 1.0
  kernel: linear
  max_iter: 1000
  probability: true

paths:
  models_dir: models
  results_dir: results
