name: Auto-Retrain on New Data

on:
  push:
    branches:
      - main
      - harsh-dev
    paths:
      - "data/raw/**.csv"
      - "params.yaml"

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy & retrain on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /home/azureuser/SMS-Spam-Detection
            export PATH="/home/azureuser/SMS-Spam-Detection/.venv/bin:$PATH"

            echo "→ Pulling branch ${{ github.ref_name }}..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            echo "→ Running pipeline..."
            dvc repro
            python main.py --skip-download

            echo "→ Restarting services..."
            sudo systemctl restart streamlit || true
            sudo systemctl restart mlflow    || true

            echo "✅ Retrain complete."
