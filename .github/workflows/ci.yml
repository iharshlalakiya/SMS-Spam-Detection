name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - harsh-dev
  pull_request:
    branches:
      - main
      - harsh-dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host:     ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key:      ${{ secrets.VM_SSH_KEY }}
        script: |
          set -e

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploying branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cd /home/azureuser/SMS-Spam-Detection
          export PATH="/home/azureuser/SMS-Spam-Detection/.venv/bin:$PATH"

          echo "→ Pulling latest code from branch ${{ github.ref_name }}..."
          git fetch origin
          git checkout ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

          echo "→ Installing/updating Python dependencies..."
          pip install -r requirements.txt --quiet

          echo "→ Restarting services..."
          sudo systemctl restart streamlit || true
          sudo systemctl restart mlflow    || true

          echo ""
          echo "✅ Deployment complete!"
          echo "   Streamlit → http://${{ secrets.VM_HOST }}:8501"
          echo "   MLflow    → http://${{ secrets.VM_HOST }}:5000"
