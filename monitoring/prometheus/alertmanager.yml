global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "default"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Add email or Slack here when ready:
    #
    # email_configs:
    #   - to: "your@email.com"
    #     from: "alertmanager@sms-spam.com"
    #     smarthost: "smtp.gmail.com:587"
    #     auth_username: "your@email.com"
    #     auth_password: "<app_password>"
    #
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #     channel: "#alerts"
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
