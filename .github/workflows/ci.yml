name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/ -v

    - name: Reproduce DVC pipeline with MLflow tracking
      env:
        MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      run: |
        dvc repro

    - name: Print MLflow tracking summary
      if: always()
      run: |
        echo "========================================"
        echo "  MLflow run logged to:"
        echo "  ${{ secrets.MLFLOW_TRACKING_URI }}"
        echo "========================================"

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-reproduce
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host:     ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key:      ${{ secrets.VM_SSH_KEY }}
        script: |
          set -e
          export PATH="/home/azureuser/SMS-Spam-Detection/.venv/bin:$PATH"
          cd /home/azureuser/SMS-Spam-Detection

          echo "-> Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "-> Installing dependencies..."
          pip install -r requirements.txt --quiet

          echo "-> Reproducing DVC pipeline if stale..."
          dvc repro

          echo "-> Restarting Streamlit service..."
          sudo systemctl restart streamlit
          sudo systemctl status streamlit --no-pager

          echo "-> Restarting monitoring stack..."
          cd monitoring
          docker compose pull --quiet
          docker compose up -d
          cd ..

          echo "-> Checking all containers..."
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "Deployment complete!"
          echo "  App:        http://${{ secrets.VM_HOST }}"
          echo "  Grafana:    http://${{ secrets.VM_HOST }}:3000"
          echo "  Prometheus: http://${{ secrets.VM_HOST }}:9090"

    - name: Deployment summary
      if: always()
      run: |
        echo "================================================"
        echo "  Deploy job finished"
        echo "  Target:      ${{ secrets.VM_HOST }}"
        echo "  Triggered by: ${{ github.actor }}"
        echo "  Commit:      ${{ github.sha }}"
        echo "================================================"
